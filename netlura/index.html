<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/netflix.png" type="image/png">
    <title>Netflix</title>
</head>
<body>
    <header class="site-header">
        <button id="theme-toggle" aria-label="Alternar tema" title="Alternar tema">🌙</button>
    </header>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-labelledby="profiles-heading">
            <nav id="profiles-nav" aria-label="Perfis de usuário">
                <ul class="profiles" role="list">
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil Débora">
                            <figure>
                                <img src="assets/perfil_1.png" alt="Avatar de personagem em animação de massinha com traços góticos, rosto alongado e fundo roxo.">
                                <figcaption>Débora</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil Mateus">
                            <figure>
                                <img src="assets/perfil_2.png" alt="boné azul com fundo azul">
                                <figcaption>Mateus</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil Ashe">
                            <figure>
                                <img src="assets/perfil_3.png" alt="guereira medieval com cabelo branco">
                                <figcaption>Ashe</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Selecionar Perfil Noene">
                            <figure>
                                <img src="assets/perfil_4.png" alt="k-idol de cabelos pretos e fundo rosa">
                                <figcaption>Noene</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
        <div class="manage-actions">
            <button class="manage-profiles" aria-label="Gerenciar perfis">GERENCIAR PERFIS</button>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
